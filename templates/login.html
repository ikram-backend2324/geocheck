{% extends "base.html" %}
{% block content %}
<div class="auth-shell wrap">
  <div class="panel auth-card">
    <span class="eyebrow">Sign in</span>
    <h1>Welcome back.</h1>
    <p class="sub">Log in to share your location or check the control room.</p>

    {% if form.errors %}
      <div class="alert-box">Wrong username or password. Try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Username</label>
        <input class="field-input" type="text" name="username" id="id_username" required autofocus>
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        <input class="field-input" type="password" name="password" id="id_password" required>
      </div>
      <button type="submit" class="btn btn-signal btn-block">Log in</button>
    </form>
    <div class="auth-foot">No account yet? <a href="{% url 'register' %}">Register here</a></div>
  </div>
</div>
{% endblock %}
